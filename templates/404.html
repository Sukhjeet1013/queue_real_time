{% extends "base.html" %}

{% block title %}Not Found | SmartQueue{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="empty-state text-center">
                <span class="eyebrow">404 Error</span>
                <h1 class="page-title mb-3">We could not find that page</h1>
                <p class="section-muted mb-4">{{ error_message }}</p>
                <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                    <a href="{{ url_for('home') }}" class="btn btn-brand">Back Home</a>
                    <a href="{{ url_for('clinics') }}" class="btn btn-outline-brand">Browse Clinics</a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
