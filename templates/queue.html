<!DOCTYPE html>
<html>
<head>
    <title>Queue Status</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow text-center p-5">

        <!-- Token -->
        <h4 class="text-muted">Your Token</h4>
        <h1 class="token-number" id="token">{{ entry.token_number }}</h1>

        <hr>

        <!-- Now Serving -->
        <h5>
            Now Serving:
            <span id="now-serving" class="text-success fw-bold">
                {{ now_serving or "-" }}
            </span>
        </h5>

        <!-- Patients Ahead -->
        <h5 class="mt-3">
            Patients Ahead:
            <span id="patients-ahead" class="fw-bold">
                {{ patients_ahead }}
            </span>
        </h5>

        <!-- Estimated Wait -->
        <h5 class="mt-3">
            Estimated Wait:
            <span id="wait-time" class="fw-bold text-danger">
                {% if estimated_wait is not none %}
                    {{ estimated_wait }} mins
                {% else %}
                    -
                {% endif %}
            </span>
        </h5>

    </div>

</div>

<!-- ========================= -->
<!-- 🔥 JavaScript (Polling) -->
<!-- ========================= -->
<script>
const entryId = "{{ entry.id }}";

async function updateQueue() {
    try {
        const response = await fetch(`/api/queue_status/${entryId}`);
        const data = await response.json();

        document.getElementById("now-serving").innerText = data.now_serving ?? "-";
        document.getElementById("patients-ahead").innerText = data.patients_ahead;

        if (data.estimated_wait !== null) {
            document.getElementById("wait-time").innerText = data.estimated_wait + " mins";
        } else {
            document.getElementById("wait-time").innerText = "-";
        }

    } catch (error) {
        console.error("Error updating queue:", error);
    }
}

// Call every 5 seconds
setInterval(updateQueue, 5000);
</script>

</body>
</html>
