<!DOCTYPE html>
<html>
<head>
    <title>{{ clinic.clinic_name }}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body class="bg-light">

<div class="container mt-5">

    <!-- Header -->
    <div class="text-center mb-4">
        <h1 class="fw-bold">{{ clinic.clinic_name }}</h1>
        <p class="text-muted">Doctor: {{ clinic.doctor_name }}</p>
    </div>

    <!-- Card -->
    <div class="card shadow p-4 mx-auto" style="max-width: 500px; border-radius: 15px;">

        <form method="POST" action="{{ url_for('join_queue') }}" id="queue-form">

            <input type="hidden" name="clinic_id" value="{{ clinic.id }}">

            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Your Name</label>
                <input 
                    type="text" 
                    name="name" 
                    class="form-control"
                    placeholder="Enter your name"
                    required
                >
            </div>

            <!-- Phone -->
            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input 
                    type="tel" 
                    name="phone" 
                    class="form-control"
                    placeholder="Enter phone number"
                    pattern="[0-9]{10}"
                    required
                >
                <small class="text-muted">Enter 10-digit number</small>
            </div>

            <!-- Submit -->
            <button class="btn btn-primary w-100" id="submit-btn">
                Join Queue
            </button>

        </form>

        <!-- Feedback message -->
        <p id="status-msg" class="text-center mt-3 text-muted" style="display: none;">
            Joining queue...
        </p>

    </div>

</div>

<!-- JS (UX improvement) -->
<script>
const form = document.getElementById("queue-form");
const btn = document.getElementById("submit-btn");
const msg = document.getElementById("status-msg");

form.addEventListener("submit", function() {
    btn.disabled = true;
    btn.innerText = "Joining...";
    msg.style.display = "block";
});
</script>

</body>
</html>
