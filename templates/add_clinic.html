{% extends "base.html" %}

{% block title %}Add Clinic | SmartQueue{% endblock %}

{% block content %}
<section class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-8">
            <div class="soft-card form-shell">
                <div class="d-flex flex-column flex-lg-row justify-content-between align-items-lg-center gap-3 mb-4">
                    <div>
                        <span class="eyebrow">Superadmin Action</span>
                        <h1 class="page-title mb-2">Add a new clinic</h1>
                        <p class="section-muted mb-0">
                            Create a clinic profile so patients can join the queue and staff can be assigned.
                        </p>
                    </div>
                    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-brand">Back to Dashboard</a>
                </div>

                <form method="POST" data-loading-form>
                    <div class="mb-3">
                        <label class="form-label">Clinic name</label>
                        <input
                            type="text"
                            name="clinic_name"
                            class="form-control form-control-lg"
                            placeholder="Enter clinic name"
                            required
                        >
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Doctor name</label>
                        <input
                            type="text"
                            name="doctor_name"
                            class="form-control form-control-lg"
                            placeholder="Enter doctor name"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-brand btn-lg" data-loading-text="Creating clinic...">
                        Create Clinic
                    </button>
                </form>
            </div>
        </div>
    </div>
</section>
{% endblock %}
