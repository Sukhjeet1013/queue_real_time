<!DOCTYPE html>
<html>
<head>
    <title>Add Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Add New Clinic</h2>

    <div class="card p-4 shadow mx-auto" style="max-width: 500px;">

        <form method="POST">

            <div class="mb-3">
                <label>Clinic Name</label>
                <input type="text" name="clinic_name" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Doctor Name</label>
                <input type="text" name="doctor_name" class="form-control" required>
            </div>

            <button class="btn btn-success w-100">Add Clinic</button>

        </form>

    </div>

</div>

</body>
</html>
